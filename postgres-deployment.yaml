apiVersion: apps/v1
kind: Deployment
metadata:
  name: baza-date-zboruri
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "utilizator"
            - name: POSTGRES_PASSWORD
              value: "parola123"
            - name: POSTGRES_DB
              value: "db_zboruri"
---
apiVersion: v1
kind: Service
metadata:
  name: baza-date-zboruri
spec:
  selector:
    app: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432