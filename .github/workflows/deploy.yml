name: CI/CD Pipeline - Flight App to Google Cloud

on:
  push:
    branches:
      - main  # Flow-ul pornește automat când dai push pe branch-ul main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west3                     # Regiunea cea mai apropiată (Frankfurt)
  REPOSITORY: aplicatie-zboruri-repo       # Numele din Artifact Registry
  SERVICE_NAME: app-backend                # Numele serviciului din Cloud Run

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Pasul 1: Descarcă codul din repository-ul tău de GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # Pasul 2: Configurează Java 17 pentru compilare
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Pasul 3: Compilează aplicația și generează fișierul .jar (fără teste pentru viteză)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Pasul 4: Autentificarea în Google Cloud folosind cheia secreta (Service Account)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Pasul 5: Autentificarea Docker în Artifact Registry-ul Google Cloud
      - name: Docker Auth
        run: |
          gcloud auth configure-docker europe-west3-docker.pkg.dev --quiet

      # Pasul 6: Construirea imaginii Docker și adăugarea tag-ului pentru Cloud
      - name: Build and Tag Docker Image
        run: |
          docker build -t europe-west3-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$SERVICE_NAME:${{ github.sha }} .

      # Pasul 7: Împingerea (Push) imaginii în Artifact Registry
      - name: Push Image to Artifact Registry
        run: |
          docker push europe-west3-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$SERVICE_NAME:${{ github.sha }}

      # Pasul 8: Deployment-ul propriu-zis pe Google Cloud Run
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
            service: app-backend
            region: europe-west3
            image: europe-west3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/aplicatie-zboruri-repo/app-backend:${{ github.sha }}
            flags: |
              --add-cloudsql-instances=${{ secrets.CLOUD_SQL_CONNECTION_NAME }}
            env_vars: |
              SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}
              SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USER }}
              SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}
              SPRING_JPA_HIBERNATE_DDL_AUTO=update
